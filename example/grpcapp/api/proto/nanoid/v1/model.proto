syntax = "proto3";

package nanoid.v1;

import "google/protobuf/timestamp.proto";

option go_package = "mkit/example/grpcapp/pkg/api/go/nanoid/v1;nanoid";

message Technology {
  string id = 1;
  string name = 2;
  string version = 3;
  string vendor = 4;
  string cpe_type = 5;
  string thumbnail_url = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}
